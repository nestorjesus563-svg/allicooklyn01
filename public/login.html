<!DOCTYPE html>
<html lang="es">

<head>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>LOGIN</title>

	

</head>
<style>

	@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

:root{
    --rosa: #FFB6C1;
    --lavanda: #D8B4FE;
    --menta: #A7F3D0;
    --texto: #6B4F4F;
    --blanco: rgba(255,255,255,0.85);
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{

    font-family: 'Poppins', sans-serif;

    min-height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;

    background: linear-gradient(
        135deg,
        #FFE4EC,
        #F3E8FF,
        #E0FFF4
    );

    padding: 20px;
}

.form-container{

    width: 100%;
    max-width: 400px;

    background: var(--blanco);

    backdrop-filter: blur(15px);

    padding: 35px;

    border-radius: 25px;

    box-shadow: 0 8px 25px rgba(216,180,254,.25);

    text-align: center;
}

h2{

    color: #8B5FBF;

    margin-bottom: 25px;

    font-size: 30px;
}

input{

    width: 100%;

    padding: 12px;

    margin-top: 12px;

    border: 2px solid #F9A8D4;

    border-radius: 15px;

    background: #FFF7FB;

    color: var(--texto);

    font-size: 15px;

    transition: .3s;
}

input:focus{

    outline: none;

    border-color: #C084FC;

    box-shadow: 0 0 12px rgba(192,132,252,.4);
}

button{

    width: 100%;

    margin-top: 20px;

    padding: 12px;

    border: none;

    border-radius: 20px;

    background: linear-gradient(
        45deg,
        var(--rosa),
        var(--lavanda)
    );

    color: #5A435A;

    font-size: 16px;

    font-weight: 600;

    cursor: pointer;

    transition: .3s;
}

button:hover{

    transform: translateY(-3px);

    box-shadow: 0 8px 20px rgba(216,180,254,.5);
}

</style>

<body>
	

	<div class="form-container">

		<h2>Iniciar Sesión</h2>

		<input
		type="text"
		id="usuario"
		placeholder="Usuario">

		<input
		type="password"
		id="contrasena"
		placeholder="Contraseña">

		<button type="button" onclick="login()">

			Entrar

		</button>

	</div>

	<script src="login.js"></script>

</body>

</html>
