<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>ALLICOOKLYN</title>

    <link rel="stylesheet" type="text/css" href="estilo.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
.alerta-error {
    display: none;
    background-color: #ffdddd;
    border-left: 4px solid #f44336;
    color: #a80000;
    padding: 10px;
    margin-top: -5px;
    margin-bottom: 15px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
}
.alerta-error.mostrar {
    display: block;
}
.input-error {
    border: 2px solid #f44336 !important;
}
</style>
</head>

<body>

<header>

<button onclick="history.back()">
    Atrás
</button>
    <div class="container-hero">

        <div class="container hero">

            <div class="customer-support">

                <i class="fa-solid fa-headset"></i>

                <div class="content-customer-support">

                    <span class="text">Soporte al cliente</span>

                    <span class="number">449-363-2146</span>

                </div>

            </div>

            <div class="container-logo">

                <i class="fa-solid fa-kitchen-set"></i>

                <h1 class="logo">

                    <a href="#">ALLICOOKLYN</a>

                </h1>

            </div>



        </div>

    </div>
    <div id="mensaje-edad" class="alerta-error"></div>

</header>



<section class="formulario">

    <h2>Datos del Cliente</h2>

    <input
    type="text"
    id="nombre"
    placeholder="Nombre">

    <input
    type="number"
    id="edad"
    placeholder="Edad" min="1" oninput="validarlaEdad()">
    <div id="mensaje-edad" class="alerta-error"></div>

    <input
    type="text"
    id="telefono"
    placeholder="Teléfono">

    <input
    type="text"
    id="direccion"
    placeholder="Dirección">

    <br><br>

    <h3>Preferencias Alimenticias</h3>

    <label>

        <input type="checkbox" id="vegetariano">

        Vegetariano

    </label>

    <br><br>

    <label>

        <input type="checkbox" id="vegano">

        Vegano

    </label>

    <br><br>

    <label>

        <input type="checkbox" id="sinlac">

        Sin Lactosa

    </label>

    <br><br>

    <label>

        <input type="checkbox" id="bajocarbo">

        Bajo en Carbohidratos

    </label>

    <br><br>

    <label>

        <input type="checkbox" id="azucar">

        Sin Azúcar

    </label>

    <br><br>

    <label>

        <input type="checkbox" id="proteina">

        Alto en Proteína

    </label>

    <br><br>

    <label>

        <input type="checkbox" id="restriccion">

        Sin Restricciones

    </label>

    <br><br>

    <button onclick="mostrarRecetas()">

        VER RECETAS

    </button>

</section>



<section id="menurecetas"></section>



<section id="ticket"></section>



<script>
    function validarlaEdad(){
        const edadInput = document.getElementById('edad');
        const mensaje = document.getElementById('mensaje-edad');
        const edad = parseInt(edadInput.value);

        if (edad < 18 && edadInput.value !== '') {
    mensaje.textContent = '⚠️ Debes ser mayor de edad.La edad mínima es 18 años ';
    mensaje.classList.add('mostrar');
    edadInput.classList.add('input-error');
   
} else {
    mensaje.classList.remove('mostrar');
    edadInput.classList.remove('input-error');
}
        }
</script>




<script src="script.js"></script>

</body>

</html>
