<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verificación de Edad</title>

    <style>

        body{

            margin: 0;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background: #fff3e0;

            font-family: Arial;
        }

        .caja{

            background: white;

            padding: 30px;

            border-radius: 20px;

            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);

            text-align: center;

            width: 300px;
        }

        h1{

            color: orange;
        }

        input{

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            border-radius: 10px;

            border: 1px solid #ccc;

            box-sizing: border-box;
        }

        button{

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            border: none;

            border-radius: 10px;

            background: orange;

            color: white;

            font-size: 16px;

            cursor: pointer;
        }

    </style>

</head>

<body>

    <div class="caja">

        <h1>ALLICOOKLYN</h1>

        <p>Ingresa tu edad</p>

        <input type="number" id="edad">

        <button onclick="verificarEdad()">

            Entrar

        </button>

    </div>

<script>

function verificarEdad(){

    const edad = document.getElementById("edad").value;

    if(edad >= 18){

        window.location.href = "inicio.html";

    }else{

        alert("Debes ser mayor de edad");
    }
}

</script>

</body>
</html>
