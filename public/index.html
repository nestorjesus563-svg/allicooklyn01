<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ALLICOOKLYN</title>

   <style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

:root{
    --rosa: #FFB6C1;
    --lavanda: #D8B4FE;
    --texto: #6B4F4F;
    --blanco: rgba(255,255,255,0.85);
}

body{

    margin: 0;

    min-height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;

    background: linear-gradient(
        135deg,
        #FFE4EC,
        #F3E8FF,
        #E0FFF4
    );

    font-family: 'Poppins', sans-serif;
}

.caja{

    background: var(--blanco);

    backdrop-filter: blur(15px);

    padding: 35px;

    border-radius: 25px;

    box-shadow: 0 8px 25px rgba(216,180,254,.25);

    text-align: center;

    width: 320px;
}

h1{

    color: #6B4F4F;

    margin-bottom: 20px;
}

input{

    width: 100%;

    padding: 12px;

    margin-top: 15px;

    border-radius: 15px;

    border: 2px solid #F9A8D4;

    background: #FFF7FB;

    box-sizing: border-box;

    font-size: 15px;

    transition: .3s;
}

input:focus{

    outline: none;

    border-color: #C084FC;

    box-shadow: 0 0 12px rgba(192,132,252,.4);
}

button{

    width: 100%;

    padding: 12px;

    margin-top: 15px;

    border: none;

    border-radius: 20px;

    background: linear-gradient(
        45deg,
        var(--rosa),
        var(--lavanda)
    );

    color: white;

    font-size: 16px;

    font-weight: 600;

    cursor: pointer;

    transition: .3s;
}

button:hover{

    transform: translateY(-3px);

    box-shadow: 0 8px 20px rgba(216,180,254,.5);
}

</style>

</head>

<body>

    <div class="caja">

        <h1>ALLICOOKLYN</h1>

        <h2>Ingresa tu fecha de nacimiento</h2>

        <input type="date" id="fechaNacimiento">

        <button onclick="verificarEdad()">

            CONTINUAR

        </button>

    </div>

<script>

function verificarEdad(){

    const fecha = document.getElementById("fechaNacimiento").value;

    if(fecha == ""){

        alert("Ingresa tu fecha de nacimiento");

        return;
    }

    const nacimiento = new Date(fecha);

    const hoy = new Date();

    let edad = hoy.getFullYear() - nacimiento.getFullYear();

    const mes = hoy.getMonth() - nacimiento.getMonth();

    if(

        mes < 0 ||

        (mes === 0 && hoy.getDate() < nacimiento.getDate())

    ){

        edad--;
    }

    if(edad >= 18){

        window.location.href = "inicio.html";

    }else{

        alert("Debes ser mayor de edad");
    }
}

</script>

</body>
</html>
