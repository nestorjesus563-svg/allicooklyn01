<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ALLICOOKLYN</title>

    <style>

        body{

            margin: 0;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background: #fff3e0;

            font-family: Arial;
        }

        .caja{

            background: white;

            padding: 30px;

            border-radius: 20px;

            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);

            text-align: center;

            width: 320px;
        }

        h1{

            color: orange;
        }

        input{

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            border-radius: 10px;

            border: 1px solid gray;

            box-sizing: border-box;
        }

        button{

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            border: none;

            border-radius: 10px;

            background: orange;

            color: white;

            font-size: 16px;

            cursor: pointer;
        }

    </style>

</head>

<body>

    <div class="caja">

        <h1>ALLICOOKLYN</h1>

        <h2>Ingresa tu fecha de nacimiento</h2>

        <input type="date" id="fechaNacimiento">

        <button onclick="verificarEdad()">

            CONTINUAR

        </button>

    </div>

<script>

function verificarEdad(){

    const fecha = document.getElementById("fechaNacimiento").value;

    if(fecha == ""){

        alert("Ingresa tu fecha de nacimiento");

        return;
    }

    const nacimiento = new Date(fecha);

    const hoy = new Date();

    let edad = hoy.getFullYear() - nacimiento.getFullYear();

    const mes = hoy.getMonth() - nacimiento.getMonth();

    if(

        mes < 0 ||

        (mes === 0 && hoy.getDate() < nacimiento.getDate())

    ){

        edad--;
    }

    if(edad >= 18){

        window.location.href = "inicio.html";

    }else{

        alert("Debes ser mayor de edad");
    }
}

</script>

</body>
</html>
